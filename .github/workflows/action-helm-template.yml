name: Action Run helm template

on:
  pull_request:
    branches: ["main"]
    paths:
      - 'helm-charts/**'

jobs:
  chart:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: v3.10.0
    # Lint + render every chart, with feature flags (ServiceMonitor, Datadog logs)
    # enabled so conditional templates are actually exercised -- a plain default
    # render leaves those blocks unrendered and hides template errors. The same
    # script runs locally via scripts/internal/run-checks.sh, so local == CI.
    - name: Check helm charts
      run: bash scripts/internal/check-helm.sh
