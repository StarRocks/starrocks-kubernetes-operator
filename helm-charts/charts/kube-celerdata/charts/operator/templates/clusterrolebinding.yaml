{{ if and .Values.celerDataOperator.enabled .Values.global.rbac.create }}
{{- if .Values.celerDataOperator.watchNamespace | not }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "operator.name" . }}-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "operator.name" . }}-operator
subjects:
- kind: ServiceAccount
  name: {{ template  "operator.serviceAccountName" . }}
  namespace: {{ template  "operator.namespace" . }}
{{- end }}
{{- end }}
