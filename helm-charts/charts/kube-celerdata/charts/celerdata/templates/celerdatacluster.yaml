apiVersion: celerdata.com/v1
kind: CelerDataCluster
metadata:
  name: {{ template "celerdatacluster.name" . }}
  namespace: {{ template "celerdatacluster.namespace" . }}
  labels:
    cluster: {{ template "celerdatacluster.name" . }}
  {{- include "celerdatacluster.labels" . | nindent 4 }}
  {{- if .Values.celerDataCluster.annotations }}
  annotations:
    {{- toYaml .Values.celerDataCluster.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.celerDataCluster.disasterRecovery }}
  disasterRecovery:
    {{- toYaml .Values.celerDataCluster.disasterRecovery | nindent 4 }}
  {{- end }}
  celerDataFeSpec:
    {{- if .Values.celerDataFeSpec.initContainers }}
    initContainers:
      {{- toYaml .Values.celerDataFeSpec.initContainers | nindent 6 }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.shareProcessNamespace }}
    shareProcessNamespace: {{ .Values.celerDataFeSpec.shareProcessNamespace }}
    {{- end }}
    image: "{{ .Values.celerDataFeSpec.image.repository }}:{{ include "celerdatacluster.fe.image.tag" . }}"
    {{- if .Values.celerDataFeSpec.entrypoint }}
    command: ["bash", "-c"]
    args:
      - {{template "celerdatacluster.entrypoint.mount.path" .}}/{{template "celerdatacluster.entrypoint.script.name" .}}
    {{- end }}
    replicas: {{ .Values.celerDataFeSpec.replicas }}
    imagePullPolicy: {{ .Values.celerDataFeSpec.imagePullPolicy }}
    {{- if .Values.celerDataFeSpec.maxUnavailablePods }}
    updateStrategy:
      rollingUpdate:
        maxUnavailable: {{ .Values.celerDataFeSpec.maxUnavailablePods }}
    {{- end }}
    {{- /*
    support both resources and resource for backward compatibility
    */}}
    {{- if .Values.celerDataFeSpec.resources }}
    {{- include "celerdatacluster.fe.resources" . | nindent 4 }}
    {{- else if .Values.celerDataFeSpec.resource }}
    {{- toYaml .Values.celerDataFeSpec.resource | nindent 4 }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.service.type }}
    service:
      type: {{ .Values.celerDataFeSpec.service.type }}
      {{- if and (eq "LoadBalancer" .Values.celerDataFeSpec.service.type) .Values.celerDataFeSpec.service.loadbalancerIP }}
      loadBalancerIP: {{ .Values.celerDataFeSpec.service.loadbalancerIP }}
      {{- end }}
      {{- if and (eq "LoadBalancer" .Values.celerDataFeSpec.service.type) .Values.celerDataFeSpec.service.loadBalancerSourceRanges}}
      loadBalancerSourceRanges:
        {{- toYaml .Values.celerDataFeSpec.service.loadBalancerSourceRanges | nindent 8 }}
      {{- end }}
      {{- if .Values.celerDataFeSpec.service.ports }}
      ports:
        {{- toYaml .Values.celerDataFeSpec.service.ports | nindent 8 }}
      {{- end }}
      {{- if or .Values.celerDataFeSpec.service.annotations .Values.datadog.metrics.enabled }}
      annotations:
        {{- if .Values.datadog.metrics.enabled }}
        prometheus.io/path: "/metrics"
        prometheus.io/port: "{{- default 8030 (include "celerdatacluster.fe.http.port" .) }}"
        prometheus.io/scrape: "true"
        {{- end }}
        {{- if .Values.celerDataFeSpec.service.annotations}}
        {{- toYaml .Values.celerDataFeSpec.service.annotations | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if .Values.celerDataFeSpec.service.labels}}
      labels:
        {{- toYaml .Values.celerDataFeSpec.service.labels | nindent 8 }}
      {{- end }}
    {{- end }}
    annotations:
      app.celerdata.io/fe-config-hash: "{{template "celerdatacluster.fe.config.hash" . }}"
      {{- if .Values.datadog.log.enabled }}
      {{- if eq (trimAll " {}" .Values.datadog.log.logConfig) "" }}
      ad.datadoghq.com/fe.logs: '[{"service":"celerdata","source":"fe"}]'
      {{- else }}
      ad.datadoghq.com/fe.logs: {{ printf "[%s]" (printf "{%s, \"source\": \"fe\", \"service\": \"celerdata\"}" (trimAll " {}" .Values.datadog.log.logConfig) | fromJson | toJson) | squote }}
      {{- end }}
      {{- end }}
      {{- if .Values.celerDataFeSpec.entrypoint }}
      app.celerdata.io/fe-entrypoint-hash: "{{ template "celerdatacluster.fe.entrypoint.script.hash" . }}"
      {{- end }}
      {{- if .Values.celerDataFeSpec.annotations }}
      {{- toYaml .Values.celerDataFeSpec.annotations | nindent 6 }}
      {{- end }}
    {{- if or .Values.celerDataFeSpec.imagePullSecrets .Values.celerDataCluster.componentValues.imagePullSecrets }}
    imagePullSecrets:
      {{- include "celerdatacluster.fe.imagePullSecrets" . | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataFeSpec.serviceAccount .Values.celerDataCluster.componentValues.serviceAccount }}
    serviceAccount: {{ include "celerdatacluster.fe.serviceAccount" . }}
    {{- end }}
    runAsNonRoot: {{ include "celerdatacluster.fe.runAsNonRoot" . }}
    {{- if .Values.celerDataFeSpec.readOnlyRootFilesystem }}
    readOnlyRootFilesystem: {{ .Values.celerDataFeSpec.readOnlyRootFilesystem }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.capabilities }}
    capabilities:
      {{- toYaml .Values.celerDataFeSpec.capabilities | nindent 6 }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.sysctls }}
    sysctls:
      {{- toYaml .Values.celerDataFeSpec.sysctls | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataFeSpec.nodeSelector .Values.celerDataCluster.componentValues.nodeSelector }}
    nodeSelector:
      {{- include "celerdatacluster.fe.nodeSelector" . | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataFeSpec.podLabels .Values.celerDataCluster.componentValues.podLabels .Values.datadog.profiling.fe }}
    podLabels:
      {{- if or .Values.celerDataFeSpec.podLabels .Values.celerDataCluster.componentValues.podLabels }}
      {{- include "celerdatacluster.fe.podLabels" . | nindent 6 }}
      {{- end }}
      {{- if .Values.datadog.profiling.fe }}
      admission.datadoghq.com/config.mode: {{ .Values.datadog.profiling.configMode }}
      admission.datadoghq.com/enabled: "true"
      {{- end }}
    {{- end }}
    {{- if or .Values.celerDataFeSpec.hostAliases .Values.celerDataCluster.componentValues.hostAliases }}
    hostAliases:
      {{- include "celerdatacluster.fe.hostAliases" . | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataFeSpec.schedulerName .Values.celerDataCluster.componentValues.schedulerName }}
    schedulerName: {{ include "celerdatacluster.fe.schedulerName" . }}
    {{- end }}
    feEnvVars:
      - name: TZ
        value: {{ .Values.timeZone }}
      {{- if .Values.datadog.log.enabled }}
      - name: LOG_CONSOLE
        value: "1"
      {{- end }}
      {{- if and .Values.initPassword.enabled (.Values.celerDataFeSpec.feEnvVars | toJson | contains "MYSQL_PWD" | not) }}
      - name: "MYSQL_PWD"
        valueFrom:
          secretKeyRef:
            name: {{ template "celerdatacluster.initpassword.secret.name" . }}
            key: password
      {{- end }}
      {{- if .Values.datadog.profiling.fe }}
      - name: ENABLE_DATADOG_PROFILE
        value: "true"
      - name: DD_PROFILING_ENABLED
        value: "true"
      - name: DD_SERVICE
        value: celerdata-fe
      - name: DD_ENV
        value: "{{ .Values.datadog.profiling.env }}"
      - name: DD_VERSION
        value: "{{ include "celerdatacluster.fe.image.tag" . }}"
      - name: DD_PROFILING_DDPROF_ALLOC_ENABLED
        value: "true"
      - name: DD_PROFILING_DDPROF_ENABLED
        value: "true"
      - name: DD_PROFILING_DDPROF_LIVEHEAP_ENABLED
        value: "true"
      - name: DD_PROFILING_DIRECTALLOCATION_ENABLED
        value: "true"
      {{- end }}
      {{- if .Values.celerDataFeSpec.feEnvVars }}
      {{- /* if it is a map, we use range to iterate to merge environment variables */}}
      {{- if eq (kindOf .Values.celerDataFeSpec.feEnvVars) "map" }}
      {{- range $key, $value := .Values.celerDataFeSpec.feEnvVars }}
      - name: {{ $key }}
        {{- if eq (kindOf $value) "string" }}
        value: {{ $value | quote }}
        {{- else }}
        {{- toYaml $value | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- else }}
      {{- /* the default kind is slice, we keep backward compatibility */}}
      {{- toYaml .Values.celerDataFeSpec.feEnvVars | nindent 6 }}
      {{- end }}
      {{- end }}
    {{- if or .Values.celerDataFeSpec.affinity .Values.celerDataCluster.componentValues.affinity }}
    affinity:
      {{- include "celerdatacluster.fe.affinity" . | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataFeSpec.tolerations .Values.celerDataCluster.componentValues.tolerations }}
    tolerations:
      {{- include "celerdatacluster.fe.tolerations" . | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataFeSpec.topologySpreadConstraints .Values.celerDataCluster.componentValues.topologySpreadConstraints }}
    topologySpreadConstraints:
      {{- include "celerdatacluster.fe.topologySpreadConstraints" . | nindent 6 }}
    {{- end }}
    terminationGracePeriodSeconds: {{ .Values.celerDataFeSpec.terminationGracePeriodSeconds }}
    {{- if .Values.celerDataFeSpec.startupProbeFailureSeconds }}
    startupProbeFailureSeconds: {{ .Values.celerDataFeSpec.startupProbeFailureSeconds }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.livenessProbeFailureSeconds }}
    livenessProbeFailureSeconds: {{ .Values.celerDataFeSpec.livenessProbeFailureSeconds }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.readinessProbeFailureSeconds }}
    readinessProbeFailureSeconds: {{ .Values.celerDataFeSpec.readinessProbeFailureSeconds }}
    {{- end }}
    minReadySeconds: {{ .Values.celerDataFeSpec.minReadySeconds }}
    podManagementPolicy: {{ .Values.celerDataFeSpec.podManagementPolicy }}
    {{- if .Values.celerDataFeSpec.lifecycle }}
    lifecycle:
      {{- toYaml .Values.celerDataFeSpec.lifecycle | nindent 6 }}
    {{- end }}
    {{- if and .Values.celerDataFeSpec.sidecarsMap .Values.celerDataFeSpec.sidecars }}
      {{ fail "celerDataFeSpec.sidecarsMap and celerDataFeSpec.sidecars cannot be set at the same time" }}
    {{- end }}
    {{- if or .Values.celerDataFeSpec.sidecarsMap .Values.celerDataFeSpec.sidecars }}
    sidecars:
      {{- if .Values.celerDataFeSpec.sidecarsMap }}
      {{- range $name, $spec := .Values.celerDataFeSpec.sidecarsMap }}
      - name: {{ $name }}
        {{- toYaml $spec | nindent 8 }}
      {{- end }}
      {{- else if .Values.celerDataFeSpec.sidecars }}
      {{- toYaml .Values.celerDataFeSpec.sidecars | nindent 6 }}
      {{- end }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.secrets }}
    secrets:
    {{- range .Values.celerDataFeSpec.secrets }}
    - name: {{ .name }}
      mountPath: {{ .mountPath }}
      subPath: {{ .subPath }}
    {{- end }}
    {{- end }}
    {{- if or .Values.celerDataFeSpec.configMaps .Values.celerDataFeSpec.entrypoint }}
    configMaps:
    {{- if .Values.celerDataFeSpec.configMaps }}
    {{- range .Values.celerDataFeSpec.configMaps }}
      - name: {{ .name }}
        mountPath: {{ .mountPath }}
        subPath: {{ .subPath }}
    {{- end }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.entrypoint }}
      - name: {{template "celerdatacluster.fe.entrypoint.script.configmap.name" .}}
        mountPath: {{template "celerdatacluster.entrypoint.mount.path" .}}/{{ template "celerdatacluster.entrypoint.script.name" .}}
        subPath: {{ template "celerdatacluster.entrypoint.script.name" .}}
    {{- end }}
    {{- end }}
    configMapInfo:
      configMapName: {{ template  "celerdatacluster.fe.configmap.name" . }}
      resolveKey: fe.conf
    {{- if or .Values.celerDataFeSpec.storageSpec.name .Values.celerDataFeSpec.emptyDirs .Values.celerDataFeSpec.hostPaths }}
    storageVolumes:
    {{- if .Values.celerDataFeSpec.storageSpec.name }}
    - name: {{ .Values.celerDataFeSpec.storageSpec.name }}{{ template "celerdatacluster.fe.meta.suffix" . }}
      {{- if .Values.celerDataFeSpec.storageSpec.storageClassName }}
      storageClassName: {{ .Values.celerDataFeSpec.storageSpec.storageClassName }}
      {{- end }}
      storageSize: "{{ .Values.celerDataFeSpec.storageSpec.storageSize }}"
      mountPath: {{ template "celerdatacluster.fe.meta.path" . }}
    - name: {{ .Values.celerDataFeSpec.storageSpec.name }}{{ template "celerdatacluster.fe.log.suffix" . }}
      {{- if .Values.celerDataFeSpec.storageSpec.logStorageClassName }}
      storageClassName: {{ .Values.celerDataFeSpec.storageSpec.logStorageClassName }}
      {{- end }}
      storageSize: "{{ .Values.celerDataFeSpec.storageSpec.logStorageSize }}"
      mountPath: {{ template "celerdatacluster.fe.log.path" . }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.emptyDirs }}
    {{- range .Values.celerDataFeSpec.emptyDirs }}
    - name: {{ .name }}
      mountPath: {{ .mountPath }}
      storageClassName: "emptyDir"
    {{- end }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.hostPaths }}
    {{- range .Values.celerDataFeSpec.hostPaths }}
    - name: {{ .name }}
      mountPath: {{ .mountPath }}
      storageClassName: "hostPath"
      hostPath:
        {{- toYaml .hostPath | nindent 8 }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- if .Values.celerDataFeSpec.persistentVolumeClaimRetentionPolicy }}
    persistentVolumeClaimRetentionPolicy:
      {{- toYaml .Values.celerDataFeSpec.persistentVolumeClaimRetentionPolicy | nindent 6 }}
    {{- end }}
  {{- if .Values.celerDataCluster.enabledBe }}
  celerDataBeSpec:
    {{- if .Values.celerDataBeSpec.initContainers }}
    initContainers:
      {{- toYaml .Values.celerDataBeSpec.initContainers | nindent 6 }}
    {{- end }}
    {{- if .Values.celerDataBeSpec.shareProcessNamespace }}
    shareProcessNamespace: {{ .Values.celerDataBeSpec.shareProcessNamespace }}
    {{- end }}
    image: "{{ .Values.celerDataBeSpec.image.repository }}:{{ include "celerdatacluster.be.image.tag" . }}"
    {{- if .Values.celerDataBeSpec.entrypoint }}
    command: ["bash", "-c"]
    args:
      - {{template "celerdatacluster.entrypoint.mount.path" .}}/{{template "celerdatacluster.entrypoint.script.name" .}}
    {{- end }}
    replicas: {{ .Values.celerDataBeSpec.replicas }}
    imagePullPolicy: {{ .Values.celerDataBeSpec.imagePullPolicy }}
    {{- if .Values.celerDataBeSpec.maxUnavailablePods }}
    updateStrategy:
      rollingUpdate:
        maxUnavailable: {{ .Values.celerDataBeSpec.maxUnavailablePods }}
    {{- end }}
    {{- /*
    support both resources and resource for backward compatibility
    */}}
    {{- if .Values.celerDataBeSpec.resources }}
    {{- include "celerdatacluster.be.resources" . | nindent 4 }}
    {{- else if .Values.celerDataBeSpec.resource }}
    {{- toYaml .Values.celerDataBeSpec.resource | nindent 4 }}
    {{- end }}
    {{- if .Values.celerDataBeSpec.service.type }}
    service:
      type: {{ .Values.celerDataBeSpec.service.type }}
      {{- if and (eq "LoadBalancer" .Values.celerDataBeSpec.service.type) .Values.celerDataBeSpec.service.loadbalancerIP }}
      loadBalancerIP: {{ .Values.celerDataBeSpec.service.loadbalancerIP }}
      {{- end }}
      {{- if and (eq "LoadBalancer" .Values.celerDataBeSpec.service.type) .Values.celerDataBeSpec.service.loadBalancerSourceRanges}}
      loadBalancerSourceRanges:
        {{- toYaml .Values.celerDataBeSpec.service.loadBalancerSourceRanges | nindent 8 }}
      {{- end }}
      {{- if .Values.celerDataBeSpec.service.ports }}
      ports:
        {{- toYaml .Values.celerDataBeSpec.service.ports | nindent 8 }}
      {{- end }}
      {{- if or .Values.celerDataBeSpec.service.annotations .Values.datadog.metrics.enabled }}
      annotations:
        {{- if .Values.datadog.metrics.enabled }}
        prometheus.io/path: "/metrics"
        prometheus.io/port: "{{- default 8040 (include "celerdatacluster.be.webserver.port" .) }}"
        prometheus.io/scrape: "true"
        {{- end }}
        {{- if .Values.celerDataBeSpec.service.annotations }}
        {{- toYaml .Values.celerDataBeSpec.service.annotations | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if .Values.celerDataBeSpec.service.labels}}
      labels:
        {{- toYaml .Values.celerDataBeSpec.service.labels | nindent 8 }}
      {{- end }}
    {{- end }}
    annotations:
      app.celerdata.io/be-config-hash: "{{template "celerdatacluster.be.config.hash" . }}"
      {{- if .Values.datadog.log.enabled }}
      {{- if eq (trimAll " {}" .Values.datadog.log.logConfig) "" }}
      ad.datadoghq.com/be.logs: '[{"service":"celerdata","source":"be"}]'
      {{- else }}
      ad.datadoghq.com/be.logs: {{ printf "[%s]" (printf "{%s, \"source\": \"be\", \"service\": \"celerdata\"}" (trimAll " {}" .Values.datadog.log.logConfig) | fromJson | toJson) | squote }}
      {{- end }}
      {{- end }}
      {{- if .Values.celerDataBeSpec.annotations }}
      {{- toYaml .Values.celerDataBeSpec.annotations | nindent 6 }}
      {{- end }}
      {{- if .Values.celerDataBeSpec.entrypoint }}
      app.celerdata.io/be-entrypoint-hash: "{{ template "celerdatacluster.be.entrypoint.script.hash" . }}"
      {{- end }}
    {{- if or .Values.celerDataBeSpec.imagePullSecrets .Values.celerDataCluster.componentValues.imagePullSecrets }}
    imagePullSecrets:
      {{- include "celerdatacluster.be.imagePullSecrets" . | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataBeSpec.serviceAccount .Values.celerDataCluster.componentValues.serviceAccount }}
    serviceAccount: {{ include "celerdatacluster.be.serviceAccount" . }}
    {{- end }}
    runAsNonRoot: {{ include "celerdatacluster.be.runAsNonRoot" . }}
    {{- if .Values.celerDataBeSpec.readOnlyRootFilesystem }}
    readOnlyRootFilesystem: {{ .Values.celerDataBeSpec.readOnlyRootFilesystem }}
    {{- end }}
    {{- if or .Values.celerDataBeSpec.capabilities .Values.datadog.profiling.be }}
    capabilities:
      {{- if or .Values.celerDataBeSpec.capabilities.add .Values.datadog.profiling.be }}
      add:
        {{- if .Values.celerDataBeSpec.capabilities.add }}
        {{- toYaml .Values.celerDataBeSpec.capabilities.add | nindent 8 }}
        {{- end }}
        {{- if .Values.datadog.profiling.be }}
        {{- if and .Values.celerDataBeSpec.capabilities.add (has "PERFMON" .Values.celerDataBeSpec.capabilities.add) | not }}
        - PERFMON
        {{- end }}
        {{- if and .Values.celerDataBeSpec.capabilities.add (has "SYS_PTRACE" .Values.celerDataBeSpec.capabilities.add) | not }}
        - SYS_PTRACE
        {{- end }}
        {{- end }}
      {{- end }}
      {{- if .Values.celerDataBeSpec.capabilities.drop }}
      drop:
        {{- toYaml .Values.celerDataBeSpec.capabilities.drop | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- if .Values.celerDataBeSpec.sysctls }}
    sysctls:
      {{- toYaml .Values.celerDataBeSpec.sysctls | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataBeSpec.podLabels .Values.celerDataCluster.componentValues.podLabels .Values.datadog.profiling.be }}
    podLabels:
      {{- if or .Values.celerDataBeSpec.podLabels .Values.celerDataCluster.componentValues.podLabels }}
      {{- include "celerdatacluster.be.podLabels" . | nindent 6 }}
      {{- end }}
      {{- if .Values.datadog.profiling.be }}
      admission.datadoghq.com/config.mode: {{ .Values.datadog.profiling.configMode }}
      admission.datadoghq.com/enabled: "true"
      {{- end }}
    {{- end }}
    {{- if or .Values.celerDataBeSpec.hostAliases .Values.celerDataCluster.componentValues.hostAliases }}
    hostAliases:
      {{- include "celerdatacluster.be.hostAliases" . | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataBeSpec.schedulerName .Values.celerDataCluster.componentValues.schedulerName }}
    schedulerName: {{ include "celerdatacluster.be.schedulerName" . }}
    {{- end }}
    {{- if or .Values.celerDataBeSpec.nodeSelector .Values.celerDataCluster.componentValues.nodeSelector }}
    nodeSelector:
      {{- include "celerdatacluster.be.nodeSelector" . | nindent 6 }}
    {{- end }}
    beEnvVars:
      - name: TZ
        value: {{ .Values.timeZone }}
      {{- if .Values.datadog.log.enabled }}
      - name: LOG_CONSOLE
        value: "1"
      {{- end }}
      {{- if and .Values.initPassword.enabled (.Values.celerDataBeSpec.beEnvVars | toJson | contains "MYSQL_PWD" | not) }}
      - name: "MYSQL_PWD"
        valueFrom:
          secretKeyRef:
            name: {{ template "celerdatacluster.initpassword.secret.name" . }}
            key: password
      {{- end }}
      {{- if .Values.datadog.profiling.be }}
      - name: ENABLE_DATADOG_PROFILE
        value: "true"
      - name: DD_PROFILING_ENABLED
        value: "true"
      - name: DD_SERVICE
        value: celerdata-be
      - name: DD_ENV
        value: "{{ .Values.datadog.profiling.env }}"
      - name: DD_VERSION
        value: "{{ include "celerdatacluster.be.image.tag" . }}"
      {{- end }}
      {{- if .Values.celerDataBeSpec.beEnvVars }}
      {{- /* if it is a map, we use range to iterate to merge environment variables */}}
      {{- if eq (kindOf .Values.celerDataBeSpec.beEnvVars) "map" }}
      {{- range $key, $value := .Values.celerDataBeSpec.beEnvVars }}
      - name: {{ $key }}
        {{- if eq (kindOf $value) "string" }}
        value: {{ $value | quote }}
        {{- else }}
        {{- toYaml $value | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- else }}
      {{- /* the default kind is slice, we keep backward compatibility */}}
      {{- toYaml .Values.celerDataBeSpec.beEnvVars | nindent 6 }}
      {{- end }}
      {{- end }}
    {{- if or .Values.celerDataBeSpec.affinity .Values.celerDataCluster.componentValues.affinity }}
    affinity:
      {{- include "celerdatacluster.be.affinity" . | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataBeSpec.tolerations .Values.celerDataCluster.componentValues.tolerations }}
    tolerations:
      {{- include "celerdatacluster.be.tolerations" . | nindent 6 }}
    {{- end }}
    {{- if or .Values.celerDataBeSpec.topologySpreadConstraints .Values.celerDataCluster.componentValues.topologySpreadConstraints }}
    topologySpreadConstraints:
      {{- include "celerdatacluster.be.topologySpreadConstraints" . | nindent 6 }}
    {{- end }}
    terminationGracePeriodSeconds: {{ .Values.celerDataBeSpec.terminationGracePeriodSeconds }}
    {{- if .Values.celerDataBeSpec.startupProbeFailureSeconds }}
    startupProbeFailureSeconds: {{ .Values.celerDataBeSpec.startupProbeFailureSeconds }}
    {{- end }}
    {{- if .Values.celerDataBeSpec.livenessProbeFailureSeconds }}
    livenessProbeFailureSeconds: {{ .Values.celerDataBeSpec.livenessProbeFailureSeconds }}
    {{- end }}
    {{- if .Values.celerDataBeSpec.readinessProbeFailureSeconds }}
    readinessProbeFailureSeconds: {{ .Values.celerDataBeSpec.readinessProbeFailureSeconds }}
    {{- end }}
    minReadySeconds: {{ .Values.celerDataBeSpec.minReadySeconds }}
    podManagementPolicy: {{ .Values.celerDataBeSpec.podManagementPolicy }}
    {{- if .Values.celerDataBeSpec.lifecycle }}
    lifecycle:
      {{- toYaml .Values.celerDataBeSpec.lifecycle | nindent 6 }}
    {{- end }}
    {{- if and .Values.celerDataBeSpec.sidecarsMap .Values.celerDataBeSpec.sidecars }}
      {{ fail "celerDataBeSpec.sidecarsMap and celerDataBeSpec.sidecars cannot be set at the same time" }}
    {{- end }}
    {{- if or .Values.celerDataBeSpec.sidecarsMap .Values.celerDataBeSpec.sidecars }}
    sidecars:
      {{- if .Values.celerDataBeSpec.sidecarsMap }}
